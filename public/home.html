<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超市自助比价</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/home_popwin.css">

    <style>
        body {
            padding: 15px 10px 100px;
        }
        
        header{
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        article{
            line-height: 40px;
        }
        .wareImg{
            display: flex;
            position: relative;
        }
        .wareImg img{
            width: 100%;
            border-radius: 10px;
        }
        .wareImg::before{
            content: "图片加载中...";
        }
        .wareImg.loaded::before{
            display: none;
        }
        
        .timeAndImg{
            display: none;;
        }
        .showTime .timeAndImg {
            display: block;
        }


        .help {
            position: absolute;
            right: 0;
            font-size: 30px;
        }
        .helpPage {
            position: absolute;
            z-index: 999;
            top: 10px;
            background-color: #e2fde4;
            border-radius: 10px;
            border: 1px solid #000;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 30px;
        }
        
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
            font-size: 18px;
            min-width: 300px;
            box-shadow: 0 0 20px #000;
        }
        
        th, td {
            padding: 2px;
            border: 1px solid #000 #fff;
        }
        
        table thead tr {
            background-color: #f1cd83;
            text-align: left;
            font-size: 20px;
            line-height: 22px;
            height: 50px;
        }
        
        table tbody tr:nth-of-type(even) {
            background-color: #f3f3f3;
        }
        
        table tbody tr:last-of-type {
            border-bottom: 2px solid #009879;
        }
        table tbody tr:hover{
            background-color: #e4f7b4;
        }
        table p {
            text-indent: 0;
            font-size: 15px;
        }
        table .wares{
            width: 80px;
        }                
        
        .xtitle button {
            background-color: #f1ea83;
            color: #000;
            font-size: 20px;
            padding: 2px;
            height: 100%;
        }
        
        .xtitle button:hover {
            color: #000;
        }
                
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="help"><i class="fas fa-question-circle" ></i></div>
        <div id="message"></div>
    </header>
    <div id="helpPage" class="helpPage hidden">
        <button class="Xwinpop">×</button>
        <article>
            <h1>使用说明</h1>
            <p>点击左侧：显示价格时间。</p>
            <p>双击单元格：编辑价格。</p>
            <p>点击筛选：弹窗筛选窗格。</p>
            <p>点击问号：弹窗帮助窗格。</p>
        </article>
    </div>
    <div id="tablecontainer">
        <table>
            <thead>
                <tr></tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
    <div id="filter" class="winpop hidden">
        <button id="Xfilter" class="Xwinpop">×</button>
        <h1>从输入框下方的列表选择</h1>
        <div id="marketArea" class="popSubArea">
            <div class="inputarea">
                <label id="marketLable">超市: </label>
                <div>
                    <button id="clearMarketLabel" type="button">清空标签</button>
                    <input type="text" id="marketInput" name="marketInput" placeholder="选择三个以下的超市↓">
                </div>
            </div>
            <div id="marketList" class="bluelist"></div>
        </div>
        <div id="wareArea" class="popSubArea">
            <div class="inputarea">
                <label id="wareLable">商品: </label>
                <div>
                    <button id="clearWareLabel" type="button">清空标签</button>
                    <input type="text" id="wareInput" name="wareInput" placeholder="选择所需商品↓">
                </div>
            </div>
            <div id="wareList" class="bluelist"></div>
        </div>
        <button id="submitselect" >选择完成</button>
    </div>
    <div id="edit" class="winpop hidden">
        <button id="Xedit" class="Xwinpop">×</button>
        <div class="priceEdit">
            <label for="priceInput"></label>
            <div class="unitarea">
                <li id="unitList" class="bluelist">
                    <!-- 此处加载单位列表 -->
                </li>
                <li class="popSubArea">
                    <input type="number" id="priceInput" name="priceInput" placeholder="请输入价格">
                    <a id="unit">元/斤 ▼</a>
                </li>
            </div>
            <div class="popSubArea">
                <label for="imgInput">图片:</label>
                <input type="file" id="imgInput" name="image" accept="image/*">
            </div>
            <a id="editImgContainer" class="hidden"><img src="#"><p></p></a>
            <button id="submitEdit" style="background-color: #287e49;">提交修改</button>
        </div>
    </div>
    <nav id="bottom-tab-bar" class="bottom-tab-bar"></nav>
    <script type="module">
        import { loadBottomBar } from './js/bottombar.mjs';
        import { unitList } from './js/showunitlist.mjs';
        import {fetchWareData} from './js/getwaredata.mjs';
        import {compressImage} from './js/compressimage.mjs';
        import {LoadAndListenFilter, closeFilter, editAndListen} from './js/home_modules/modules.mjs';

        // 全局常量和变量
        const API_URL = window.location.origin + '/api';
        const DOM = {
            helpPage: document.querySelector('#helpPage'),
            message: document.getElementById('message'),
            tablecontainer: document.getElementById('tablecontainer'),
            filter: document.querySelector('#filter'),
            edit: document.querySelector('#edit'),
            bottomTabBar: document.querySelector('#bottom-tab-bar')
        };
        
        let currentToken = localStorage.getItem('token') || '';
        let userIdTemp = localStorage.getItem('userIdTemp');
        let lastTr;
        let wareData;
        
        // 初始化临时用户ID
        if (!userIdTemp) {
            userIdTemp = 'userIdTemp_' + new Date().toLocaleString('zh-CN') + '_' + Math.random().toString(36).slice(2, 9) + '_1';
            localStorage.setItem('userIdTemp', userIdTemp);
        }

        // 渲染表格
        async function renderTable(markets, wares) {
            const theadtr = DOM.tablecontainer.querySelector('thead > tr');
            const tbody = DOM.tablecontainer.querySelector('tbody');
            
            // 清空表头
            theadtr.innerHTML = '';
            
            // 创建筛选按钮
            const theth = document.createElement('th');
            theth.classList.add('xtitle');
            theth.id = 'xtitle';
            const btn = document.createElement('button');
            btn.textContent = '筛选▼';
            btn.addEventListener('click', ()=>{
                filter(DOM.filter, DOM.bottomTabBar);
            } );
            theth.appendChild(btn);
            theadtr.appendChild(theth);
            
            // 添加超市表头
            for (const market of markets) {
                const th = document.createElement('th');
                th.textContent = market;
                theadtr.appendChild(th);
            }
            
            // 清空表格体并添加商品行
            tbody.innerHTML = '';
            for (const ware of wares) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<th class="wares"><a>${ware}</a></th>`;
                tbody.appendChild(tr);
            }
            
            // 获取价格数据并继续渲染
            const tbodytrs = tbody.querySelectorAll('tr');
            await getPriceData(tbodytrs, markets);
        }

        // 获取价格数据，继续渲染表格
        async function getPriceData(tbodytrs, markets) {
            DOM.message.textContent = '价格加载中...';
            let result;
            try {
                const response = await fetch(`${API_URL}/products/user/getpricenote`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: currentToken, userIdTemp, markets })
                });
                
                result = await response.json();
            } catch (error) {
                alert('请求服务器错误');
                DOM.message.textContent = `错误: ${error.message}`;
            }

            if (result.success) {
                console.log('获取到了所有超市的价格记录');
                let wareCount = 0;
                
                // 遍历每个超市
                for (const marketData of result.data) {
                    // 遍历表格体的每一行
                    for (const tr of tbodytrs) {
                        let containware = false;
                        const wareName = tr.querySelector('th a').textContent;
                        
                        // 遍历超市的商品
                        for (const priceJson of marketData) {
                            if (priceJson.ware === wareName) {
                                containware = true;
                                wareCount++;
                                const { price, unit, url, created_at: time } = priceJson;
                                const td = document.createElement('td');
                                td.innerHTML = `<span class="price">${price}</span><span class="unit">${unit}</span>`;
                                const li = document.createElement('li');
                                li.innerHTML = `<p>时间：${time.split('T')[0]}</p>`;
                                li.className = 'timeAndImg';
                                if(url){
                                    const a = document.createElement('a');
                                    a.className = "wareImg";
                                    a.href = `${url}?${new Date().getTime()}`;
                                    a.target = "_blank";
                                    li.appendChild(a);
                                }
                                td.appendChild(li);
                                tr.appendChild(td);
                            }
                        }
                        
                        if (!containware) {
                            const td = document.createElement('td');
                            tr.appendChild(td);
                        }
                    }
                }
                
                DOM.message.textContent = `共${wareCount}个记录：`;
            } else {
                alert(result.message);
                if (result.message === '请先登录或注册，试用次数结束') {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    currentToken = '';
                    window.location.href = '/login';
                }
            }
        }

        // 筛选超市和商品
        async function filter(filterNode, bottomTabBarNode) {
            filterNode.classList.remove('hidden');
            bottomTabBarNode.classList.add('hidden');

            if (filterNode.dataset.loading)  return ;
            filterNode.dataset.loading = true;

            // 获取DOM元素
            const marketLable = filterNode.querySelector('#marketLable');
            const wareLable = filterNode.querySelector('#wareLable');
            const submitBtn = filterNode.querySelector('#submitselect');

            // 选择完成按钮添加事件监听器
            submitBtn.addEventListener('click', () => {
                filterNode.classList.add('hidden');
                bottomTabBarNode.classList.remove('hidden');
                const { markets, wares } = closeFilter(marketLable, wareLable);
                if (markets && wares) {
                    renderTable(markets, wares);
                }else{
                    DOM.message.textContent = '请选择超市和商品';
                }
            });

            //加载列表和设置其他监听
            LoadAndListenFilter(filterNode, bottomTabBarNode, wareData)
        }

        // 展开/隐藏时间信息
        function spreadTime(tbody) {
            tbody.addEventListener('click', (e) => {
                const tr = e.target.closest('tr');
                const th = e.target.closest('th');
                if (!th) return;
                
                if (!tr.classList.contains('showTime')) {
                    // 展开时间
                    tr.classList.add('showTime');
                    tr.querySelectorAll('.wareImg').forEach(wareImg => {
                        if(wareImg && wareImg.href){
                            const img = document.createElement('img');
                            img.src = wareImg.href;
                            wareImg.appendChild(img);
                            img.addEventListener('load', (e)=> { e.target.closest('a').classList.add('loaded'); });
                            wareImg.removeAttribute('href');
                        }
                    });
                    
                    // 关闭其他行
                    if (lastTr && lastTr !== tr) { lastTr.classList.remove('showTime')};
                    lastTr = tr;
                } else {
                    tr.classList.remove('showTime'); // 隐藏时间和图片
                }
            });
        }

        // 双击单元格弹出编辑窗口
        function popEdit(tbody, editNode) {
            tbody.addEventListener('dblclick', (e) => {
                const td = e.target.closest('td');
                if (!td) return;
                // 显示编辑弹窗
                editNode.classList.remove('hidden');

                const market = DOM.tablecontainer.querySelectorAll('thead th')[td.cellIndex].textContent;
                const firstTh = e.target.closest('tr').querySelector('th');
                const ware = firstTh.querySelector('a').textContent;
                // 初始化单位列表点击事件
                editNode.querySelector('#unit').addEventListener('click', (e)=>{unitList(e, wareData.unit)} );
                //编辑窗口赋值和监听
                editAndListen(compressImage, market, ware, td, editNode, DOM.bottomTabBar, API_URL, currentToken, userIdTemp);
            });
        }


        // 去除#后面别名的函数
        function delAlias(data) {
            return data.map(item => item.split('#')[0]);
        }
        function toggleHelp (){DOM.helpPage.classList.toggle('hidden')};

        // 页面加载完成后执行
        window.addEventListener('DOMContentLoaded', async () => {
            //点击显示和隐藏帮助页面
            document.querySelector('header .help').addEventListener('click', toggleHelp)
            DOM.helpPage.querySelector('.Xwinpop').addEventListener('click', toggleHelp);
            // 获取商品数据
            wareData = await fetchWareData();
            
            // 默认加载前两个超市和所有商品
            const markets = delAlias(wareData.market.slice(0, 2));
            const wares = delAlias(wareData.ware);

            // 加载底部导航栏
            loadBottomBar(currentToken, DOM.bottomTabBar);
            
            // 渲染表格
            await renderTable(markets, wares);

            // 设置事件监听
            const tbody = DOM.tablecontainer.querySelector('tbody');
            spreadTime(tbody); // 监听点击单元格，展开数据时间
            popEdit(tbody, DOM.edit); // 监听双击单元格，编辑弹窗
        });
    </script>
</body>
</html>
