<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超市自助比价</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">

    <style>
        body {
            padding: 15px 10px 100px;
        }
        
        header{
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        article{
            line-height: 40px;
        }
        .wareImg{
            display: flex;
            position: relative;
        }
        .wareImg img{
            width: 100%;
            border-radius: 10px;
        }
        .wareImg::before{
            content: "图片加载中...";
        }
        .wareImg.loaded::before{
            display: none;
        }
        
        .help {
            position: absolute;
            right: 0;
            font-size: 30px;
        }
        .helpPage {
            position: absolute;
            z-index: 999;
            top: 10px;
            background-color: #e2fde4;
            border-radius: 10px;
            border: 1px solid #000;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 30px;
        }
        
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
            font-size: 18px;
            min-width: 300px;
            box-shadow: 0 0 20px #000;
        }
        
        th, td {
            padding: 2px;
            border: 1px solid #000 #fff;
        }
        
        table thead tr {
            background-color: #f1cd83;
            text-align: left;
            font-size: 20px;
            line-height: 22px;
            height: 50px;
        }
        
        table tbody tr:nth-of-type(even) {
            background-color: #f3f3f3;
        }
        
        table tbody tr:last-of-type {
            border-bottom: 2px solid #009879;
        }
        table tbody tr:hover{
            background-color: #e4f7b4;
        }
        table p {
            text-indent: 0;
            font-size: 15px;
        }
        table .wares{
            width: 80px;
        }
                
        #unit {
            text-decoration: underline 2px;
            text-underline-offset: 5px;
            cursor: pointer;
            font-size: 20px;
        }
        
        #unitList {
            border-radius: 10px 10px 0 0;
        }
        
        #filter .bluelist {
            background-color: transparent;
            border: 0 0 0 2px solid #3b3b3b;
            border-radius: 0;
            max-height: 150px;
        }
        
        #filter .bluelist a {
            background: linear-gradient(to top, #adecff 0%, transparent 50%);
        }

        #filter label {
            justify-content: flex-start;
            font-size: 20px;
            margin-bottom: 10px;
        }
        
        #filter label span {
            color: green;
            cursor: pointer;
        }
        
        #filter label span::after {
            content: '×';
            color: #852626;
            cursor: pointer;
        }
        
        #submitselect {
            width: 300px;
        }
        
        .Xwinpop {
            background-color: #fff;
            position: absolute;
            z-index: 997;
            top: 5px;
            right: 5px;
            font-size: 30px;
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 5px;
            border: 1px solid #000;
            cursor: pointer;
            color: #852626;
        }
        
        .winpop {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            padding: 5px;
            min-height: 650px;
            background-color: #eaf5ff;
            box-shadow: 3px 3px 3px #000;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            margin: 0 10px;
            position: absolute;
            top: 50px;
            z-index: 998;
        }
        .winpop h1{
            font-size: 20px;
        }
        
        .popSubArea {
            background-color: #fff8eb;
            width: 100%;
            border-radius: 10px;
            padding: 5px;
        }
        
        #edit {
            min-height: auto;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
        }
        #edit label{
           font-size: 20px;
        }
        #editWareImg{
            width: 150px;
        }
        #editWareImg img{
            width: 100%;
        }
        #edit .popSubArea{
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .priceEdit {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: 50px;
            gap: 5px;
        }
        
        .priceEdit .unitarea {
            display: flex;
            flex-direction: column;
            gap: inherit;
            justify-content: center;
        }
        
        .priceEdit .bluelist {
            display: none;
        }
        
        .inputarea {
            display: flex;
            flex-direction: column;
        }
        
        .inputarea > div {
            display: flex;
            gap: 3px;
        }
        
        .inputarea button {
            width: 100px;
            background-color: #4e7188;
        }
        
        .xtitle button {
            background-color: #f1ea83;
            color: #000;
            font-size: 20px;
            padding: 2px;
            height: 100%;
        }
        
        .xtitle button:hover {
            color: #000;
        }
                
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="help"><i class="fas fa-question-circle" ></i></div>
        <div id="message"></div>
    </header>
    <div id="helpPage" class="helpPage hidden">
        <button class="Xwinpop">×</button>
        <article>
            <h1>使用说明</h1>
            <p>点击左侧：显示价格时间。</p>
            <p>双击单元格：编辑价格。</p>
            <p>点击筛选：弹窗筛选窗格。</p>
            <p>点击问号：弹窗帮助窗格。</p>
        </article>
    </div>
    <div id="tablecontainer">
        <table>
            <thead>
                <tr></tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
    <div id="filter" class="winpop hidden">
        <button id="Xfilter" class="Xwinpop">×</button>
        <h1>从输入框下方的列表选择</h1>
        <div id="marketArea" class="popSubArea">
            <div class="inputarea">
                <label id="marketLable">超市: </label>
                <div>
                    <button id="clearMarketLabel" type="button">清空标签</button>
                    <input type="text" id="marketInput" name="marketInput" placeholder="选择三个以下的超市↓">
                </div>
            </div>
            <div id="marketList" class="bluelist"></div>
        </div>
        <div id="wareArea" class="popSubArea">
            <div class="inputarea">
                <label id="wareLable">商品: </label>
                <div>
                    <button id="clearWareLabel" type="button">清空标签</button>
                    <input type="text" id="wareInput" name="wareInput" placeholder="选择所需商品↓">
                </div>
            </div>
            <div id="wareList" class="bluelist"></div>
        </div>
        <button id="submitselect" style="background-color: #287e49;">选择完成</button>
    </div>
    <div id="edit" class="winpop hidden">
        <button id="Xedit" class="Xwinpop">×</button>
        <div class="priceEdit">
            <label for="priceInput"></label>
            <div class="unitarea">
                <li id="unitList" class="bluelist">
                    <!-- 此处加载单位列表 -->
                </li>
                <li class="popSubArea">
                    <input type="number" id="priceInput" name="priceInput" placeholder="请输入价格">
                    <a id="unit">元/斤 ▼</a>
                </li>
            </div>
            <div class="popSubArea">
                <label for="imgInput">图片:</label>
                <input type="file" id="imgInput" name="image" accept="image/*">
            </div>
            <a id="editWareImg" class="hidden"><img src="#"><p></p></a>
            <button id="submitEdit" style="background-color: #287e49;">提交修改</button>
        </div>
    </div>
    <nav id="bottom-tab-bar" class="bottom-tab-bar"></nav>
    <script type="module">
        import { loadBottomBar } from './js/bottombar.mjs';
        import { unitList } from './js/showunitlist.mjs';
        import {fetchWareData} from './js/getwaredata.mjs';
        import {compressImage} from './js/compressimage.mjs';
        import {LoadAndListenFilter, closeFilter} from './js/home_modles.mjs';

        // 全局常量和变量
        const API_URL = window.location.origin + '/api';
        const DOM = {
            helpPage: document.querySelector('#helpPage'),
            message: document.getElementById('message'),
            tablecontainer: document.getElementById('tablecontainer'),
            filter: document.querySelector('#filter'),
            edit: document.querySelector('#edit'),
            bottomTabBar: document.querySelector('#bottom-tab-bar')
        };
        
        let currentToken = localStorage.getItem('token') || '';
        let userIdTemp = localStorage.getItem('userIdTemp');
        let poptimes = 0;
        let editpoptimes = 0;
        let timeTr = null;
        let wareData = null;
        let theImg;
        
        // 初始化临时用户ID
        if (!userIdTemp) {
            userIdTemp = 'userIdTemp_' + new Date().toLocaleString('zh-CN') + '_' + Math.random().toString(36).slice(2, 9) + '_1';
            localStorage.setItem('userIdTemp', userIdTemp);
        }

        // 渲染表格
        async function renderTable(markets, wares) {
            const theadtr = DOM.tablecontainer.querySelector('thead > tr');
            const tbody = DOM.tablecontainer.querySelector('tbody');
            
            // 清空表头
            theadtr.innerHTML = '';
            
            // 创建筛选按钮
            const theth = document.createElement('th');
            theth.classList.add('xtitle');
            theth.id = 'xtitle';
            const btn = document.createElement('button');
            btn.innerText = '筛选▼';
            btn.addEventListener('click', ()=>{
                filter(DOM.filter, DOM.bottomTabBar);
            } );
            theth.appendChild(btn);
            theadtr.appendChild(theth);
            
            // 添加超市表头
            for (const market of markets) {
                const th = document.createElement('th');
                th.textContent = market;
                theadtr.appendChild(th);
            }
            
            // 清空表格体并添加商品行
            tbody.innerHTML = '';
            for (const ware of wares) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<th class="wares"><a>${ware}</a></th>`;
                tbody.appendChild(tr);
            }
            
            // 获取价格数据并继续渲染
            const tbodytrs = tbody.querySelectorAll('tr');
            await getPriceData(tbodytrs, markets);
        }

        // 获取价格数据，继续渲染表格
        async function getPriceData(tbodytrs, markets) {
            DOM.message.textContent = '价格加载中...';
            
            try {
                const response = await fetch(`${API_URL}/products/user/getpricenote`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: currentToken, userIdTemp, markets })
                });
                
                const result = await response.json();

                if (result.success) {
                    console.log('获取到了所有超市的价格记录');
                    let wareCount = 0;
                    
                    // 遍历每个超市
                    for (const marketData of result.data) {
                        // 遍历表格体的每一行
                        for (const tr of tbodytrs) {
                            let containware = false;
                            const wareName = tr.querySelector('th a').textContent;
                            
                            // 遍历超市的商品
                            for (const priceJson of marketData) {
                                if (priceJson.ware === wareName) {
                                    containware = true;
                                    wareCount++;
                                    const { price, unit, url, created_at: time } = priceJson;
                                    const td = document.createElement('td');
                                    td.innerHTML = `<span class="price">${price}</span><span class="unit">${unit}</span><p class='hidden'>时间：${time.split('T')[0]}</p>`;
                                    if(url){
                                        const a = document.createElement('a');
                                        a.className = "wareImg hidden";
                                        a.href = `${url}?${new Date().getTime()}`;
                                        a.target = "_blank";
                                        td.appendChild(a);
                                    }
                                    tr.appendChild(td);
                                }
                            }
                            
                            if (!containware) {
                                const td = document.createElement('td');
                                tr.appendChild(td);
                            }
                        }
                    }
                    
                    DOM.message.textContent = `共${wareCount}个记录：`;
                } else {
                    handleError(result.message);
                }
            } catch (error) {
                alert('请求服务器错误');
                DOM.message.textContent = `错误: ${error.message}`;
            }
        }

        // 处理错误信息
        function handleError(message) {
            alert(message);
            if (message === '请先登录或注册，试用次数结束') {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                currentToken = '';
                window.location.href = '/login';
            }
        }

        // 筛选超市和商品
        async function filter(filterNode, bottomTabBarNode) {
            poptimes++;
            
            filterNode.classList.remove('hidden');
            bottomTabBarNode.classList.add('hidden');
            if (poptimes > 1)  return ;

            // 获取DOM元素
            const marketLable = filterNode.querySelector('#marketLable');
            const wareLable = filterNode.querySelector('#wareLable');
            const submitBtn = filterNode.querySelector('#submitselect');

            // 首次加载时添加事件监听器
            // 选择完成按钮
            submitBtn.addEventListener('click', () => {
                filterNode.classList.add('hidden');
                bottomTabBarNode.classList.remove('hidden');
                const { markets, wares } = closeFilter(marketLable, wareLable);
                if (markets && wares) {
                    renderTable(markets, wares);
                }else{
                    DOM.message.textContent = '请选择超市和商品';
                }
            });

            //加载列表和设置其他监听
            LoadAndListenFilter(filterNode, bottomTabBarNode, wareData)
        }



        // 输入框聚焦时隐藏底部导航栏，失去焦点时显示
        function toggleBottomTabBar() {
            const inputs = document.querySelectorAll('#edit input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    DOM.bottomTabBar.classList.add('hidden');
                });
                
                input.addEventListener('blur', () => {
                    DOM.bottomTabBar.classList.remove('hidden');
                });
            });
        }

        // 展开/隐藏时间信息
        function spreadTime(tbody) {
            tbody.addEventListener('click', (e) => {
                const tr = e.target.closest('tr');
                const th = e.target.closest('th');
                if (!th) return;
                
                if (!tr.classList.contains('showTime')) {
                    // 展开时间
                    tr.classList.add('showTime');
                    tr.querySelectorAll('p').forEach(element => {
                        element.classList.remove('hidden');
                    });
                    tr.querySelectorAll('.wareImg').forEach(element => {
                        element.classList.remove('hidden');
                        if(element.href){
                            const img = document.createElement('img');
                            img.src = element.href;
                            element.appendChild(img);
                            img.addEventListener('load', (e)=> { e.target.closest('a').classList.add('loaded'); });
                            element.removeAttribute('href');
                        }
                    });
                    
                    // 关闭其他行
                    if (timeTr && timeTr !== tr) {
                        timeTr.classList.remove('showTime');
                        timeTr.querySelectorAll('p').forEach(element => {
                            element.classList.add('hidden');
                        });
                        timeTr.querySelectorAll('.wareImg').forEach(element => {
                            element.classList.add('hidden');
                        });
                    }
                    
                    timeTr = tr;
                } else {
                    // 隐藏时间
                    tr.classList.remove('showTime');
                    tr.querySelectorAll('p').forEach(element => {
                        element.classList.add('hidden');
                    });
                    tr.querySelectorAll('.wareImg').forEach(element => {
                        element.classList.add('hidden');
                    });
                }
            });
        }

        // 双击单元格弹出编辑窗口
        function popEdit(tbody) {
            tbody.addEventListener('dblclick', (e) => {
                const td = e.target.closest('td');
                if (!td) return;
                
                const firstTh = e.target.closest('tr').querySelector('th');
                const ware = firstTh.querySelector('a').textContent;
                editpoptimes++;
                edit(ware, td, editpoptimes);
            });
        }

        // 启动编辑弹窗
        function edit(ware, td, editpoptimes) {
            // 显示编辑弹窗
            DOM.edit.classList.remove('hidden');
            
            // 关闭按钮
            DOM.edit.querySelector('.Xwinpop').addEventListener('click', () => {
                DOM.edit.classList.add('hidden');
            });
            
            // 编辑弹窗赋值
            let price, unit, imgSrc;
            
            if (td.innerHTML) {
                price = td.querySelector('.price').textContent;
                unit = td.querySelector('.unit').textContent;
                const wareImg = td.querySelector('.wareImg');
                if(wareImg){
                    imgSrc = wareImg.href;
                    if(!imgSrc){
                        imgSrc = wareImg.querySelector('img').src;
                    }
                }
            }
            
            const priceInput = DOM.edit.querySelector('#priceInput');
            const unitText = DOM.edit.querySelector('#unit');
            const imgInput = DOM.edit.querySelector('#imgInput');
            const imgContainer = DOM.edit.querySelector('#editWareImg');
            const editWareImg = imgContainer.querySelector('img');
            const market = DOM.tablecontainer.querySelectorAll('thead th')[td.cellIndex].textContent;
            
            DOM.edit.querySelector('label').textContent = `${market}：${ware}`;
            priceInput.value = price || '';
            unitText.textContent = (unit || '元/斤') + ' ▼';
            if(imgSrc){
                imgContainer.classList.remove('hidden');
                editWareImg.src = imgSrc;
            }else{
                imgContainer.classList.add('hidden')
            }

            // 上传数据并更新表格
            if (editpoptimes > 1) return;
            imgInput.addEventListener('change', async (e)=>{
                const img = e.target.files[0];
                if(!img) return;

                imgContainer.classList.remove('hidden');
                const imgSize = imgContainer.querySelector('p');
                // 压缩图片
                const compressedFile = await compressImage(img);
                imgSize.textContent = `${(compressedFile.size / 1024).toFixed(2)} KB`
                theImg = compressedFile;
                // 显示图片
                editWareImg.src = URL.createObjectURL(compressedFile);
            });
            const submitButton = DOM.edit.querySelector('#submitEdit');
            submitButton.addEventListener('click', async (e) => {
                const btn = e.target;
                const originalText = btn.textContent;
                btn.textContent = '正在提交...';
                btn.disabled = true;

                const newPrice = priceInput.value;
                const newUnit = unitText.textContent.split(' ')[0];

                const formData = new FormData();
                formData.append('image', theImg);
                formData.append('jsonData', JSON.stringify({
                    token:currentToken, 
                    userIdTemp, 
                    marketInput:market, 
                    wareInput:ware, 
                    priceInput:newPrice, 
                    unit:newUnit 
                }));
                
                try {
                    const response = await fetch(`${API_URL}/products/user/submitprice`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        alert('修改成功');
                        location.reload();
                    } else {
                        handleError(result.message);
                    }
                } catch (error) {
                    console.error('提交价格失败:', error);
                    alert('请求服务器错误');
                } finally {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            });
        }

        // 去除#后面别名的函数
        function delAlias(data) {
            return data.map(item => item.split('#')[0]);
        }
        function toggleHelp (){DOM.helpPage.classList.toggle('hidden')};

        // 页面加载完成后执行
        window.addEventListener('DOMContentLoaded', async () => {
            //点击显示和隐藏帮助页面
            document.querySelector('header .help').addEventListener('click', toggleHelp)
            DOM.helpPage.querySelector('.Xwinpop').addEventListener('click', toggleHelp);
            // 获取商品数据
            wareData = await fetchWareData();
            
            // 初始化单位列表点击事件
            document.querySelector('#unit').addEventListener('click', (e)=>{unitList(e, wareData.unit)} );
            // 默认加载前两个超市和所有商品
            const markets = delAlias(wareData.market.slice(0, 2));
            const wares = delAlias(wareData.ware);

            // 加载底部导航栏
            loadBottomBar(currentToken, DOM.bottomTabBar);
            
            // 渲染表格
            await renderTable(markets, wares);

            // 设置事件监听
            const tbody = DOM.tablecontainer.querySelector('tbody');
            spreadTime(tbody); // 监听点击单元格，展开数据时间
            popEdit(tbody); // 监听双击单元格，编辑弹窗
            toggleBottomTabBar(); // 输入框聚焦时隐藏底部导航栏
        });
    </script>
</body>
</html>
