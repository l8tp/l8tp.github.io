<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超市自助比价</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        input {width: 100%}
        
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }

        .user-info {
            text-align: center;
            width: 100%;
        }
        .user-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }
        
        .btn-secondary {
            background: #48bb78;
        }
        
        .btn-danger {
            background: #fc8181;
        }
        
        .btn-secondary:hover {
            background: #38a169;
        }

        .managepanel {
            display: none;
            flex-direction: column;
            row-gap: 10px;
            margin-bottom: 20px;
        }
        .submitarea {
            width: 100%;
            margin-bottom: 20px;
        }
        .delarea{
            background-color: rgba(255, 0, 0, 0.1); 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            border-radius: 10px;
        }

    </style>
</head>
<body>
    <div id="userInfo" class="user-info">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="managepanel">
            <button class="btn-secondary" id="getalluserBtn">获取所有用户</button>
            <a id="showalluser"></a>
            <div class="delarea">
                <form>
                    <input type="text" id="delusername" placeholder="请输入用户名" style="background-color:  rgba(255, 0, 0, 0.1);">
                </form>
                <div style="display: flex; flex-direction: row; gap: 5px;">
                    <button class="btn-danger" id="deluserBtn">删除此用户</button>
                </div>
            </div>
            <div class="delarea">
                <form>
                    <input type="text" id="delware" placeholder="请输入商品名" style="background-color:  rgba(255, 0, 0, 0.1);">
                </form>
                <button class="btn-danger" id="delwareBtn">删除此商品的价格</button>
            </div>
        </div>
        <div style="margin-bottom: 20px; background: #f7fafc; padding: 15px; border-radius: 8px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <span style="color: #718096;">用户名:</span>
                <span id="userName" style="font-weight: 500;"></span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <span style="color: #718096;">用户ID:</span>
                <span id="userId" style="font-weight: 500;"></span>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span style="color: #718096;">邮箱:</span>
                <span id="userEmail" style="font-weight: 500;">未设置</span>
            </div>
        </div>
        
        <button  id="logoutBtn" class="btn-danger">退出登录</button>
    </div>

    <nav id="bottom-tab-bar"></nav>
    <script type="module">
        import {loadBottomBar} from './js/bottombar.mjs';
        const API_URL = window.location.origin + '/api';
        let currentToken = localStorage.getItem('token') || '';

        // 显示用户信息
        function showUserInfo() {
            const user = JSON.parse(localStorage.getItem('user')) 
            const username = user.username;
            
            document.getElementById('userName').textContent = username;
            document.getElementById('userId').textContent = user.id;
            document.getElementById('userEmail').textContent = user.email || '未设置';
            
            // 设置用户头像
            const avatar = document.getElementById('userAvatar');
            avatar.textContent = username.charAt(0).toUpperCase();
            
            //显示用户面板
            if(user.id < 0){
                document.querySelector('.managepanel').style.display = 'flex'
            };
        }

        //管理员获取所有用户
        async  function getalluser(){
            const showalluser = document.getElementById('showalluser');
            showalluser.innerHTML = `<p>加载中...</p>`
            try {
                const response = await fetch(`${API_URL}/manage/getalluser`, {
                    method: 'GET',
                    headers: {'authorization': currentToken }
                    // body: JSON.stringify({ token: currentToken })
                });

                const result = await response.json();

                if (result.success) {
                    console.log('获取到了所有用户记录')
                    console.log(result)
                    showalluser.innerHTML = `<p>共${result.count}个用户：</p><br>`
                    result.users.forEach(element => {
                        const ele = Object.entries(element)
                        ele.forEach(u => {
                            showalluser.innerHTML +=  `<p>${u.join(': ')}</p>`

                        });
                        showalluser.innerHTML += '<br>'
                    });
                } else {
                    alert(result.message);
                }

             } catch (error) {
                alert('网络错误，请检查服务器是否运行');
            }
        }

        //管理员删除用户
        async  function deluser(){
            const delusername = document.getElementById('delusername').value;
            const conf = confirm(`确定要删除${delusername}吗？`)
            if (!conf){
                console.log('管理员取消删除')
                return
            }

            try {
                const response = await fetch(`${API_URL}/manage/deluser`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json', 'authorization': currentToken },
                    body: JSON.stringify({ delusername })
                });
                const result = await response.json();

                if (result.success) {
                    console.log(`用户${delusername}删除成功`);
                    alert(`${delusername}删除成功`)
                } else {
                    alert(result.message);
                }

             } catch (error) {
                alert('网络错误，请检查服务器是否运行');
            }
        }

        //管理员删除商品
        async function delware(){
            const delware = document.getElementById('delware').value;
            const response = await fetch('/json/ware.json');
            const ware = await response.json();
            const markets = ware.market
            //去除超市别名
            let newmarkets = [];
            for (let i of markets){newmarkets.push(i.split('#')[0])};
            const conf = confirm(`确定要删除（${delware}）吗？`)
            if (!conf){
                console.log('管理员取消删除')
                return
            }

            try {
                const response = await fetch(`${API_URL}/products/manage/delware`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json', 'authorization': currentToken },
                    body: JSON.stringify({ markets: newmarkets, delware })
                });
                const result = await response.json();

                if (result.success) {
                    console.log(`商品${delware}删除成功`);
                    alert(`${delware}删除成功`)
                } else {
                    alert(result.message);
                }

             } catch (error) {
                console.log('请求服务器错误', error)
                alert('请求服务器错误');
            }

        }
        
                // 退出登录
        async function logout() {
            if (currentToken) {
                try {
                    await fetch(`${API_URL}/user/logout`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: currentToken })
                    });
                } catch (error) {
                    // 忽略错误
                }
            }
            
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            currentToken = '';
            
            window.location.href = '/login'
        }

        // 验证token
        async function verifyToken() {
            if (!currentToken) return false;
            
            try {
                const response = await fetch(`${API_URL}/user/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: currentToken })
                });
                
                const result = await response.json();
                if (result.success) {
                    showUserInfo(result.user);
                    return true;
                }
            } catch (error) {
                // 忽略错误
            }
            
            return false;
        }


        // 输入框聚焦时隐藏底部导航栏，失去焦点时显示
        function addInputListener(){
            document.querySelector('.managepanel').querySelectorAll('input').forEach(input => {
                input.addEventListener('focus', ()=>{
                    document.querySelector('#bottom-tab-bar').style.display = 'none';
                });
                input.addEventListener('blur', ()=>{
                    document.querySelector('#bottom-tab-bar').style.display = 'flex';
                });
            })
        }
        //每个按钮增加点击事件监听
        function addBtnListener(){
            document.querySelector('#getalluserBtn').addEventListener('click',getalluser);
            document.querySelector('#deluserBtn').addEventListener('click',deluser);
            document.querySelector('#delwareBtn').addEventListener('click',delware);
            document.querySelector('#logoutBtn').addEventListener('click',logout);
        }
        // 页面加载时检查登录状态
        window.addEventListener('DOMContentLoaded', async ()=>{
            // 验证token
            const isValid = await verifyToken();
            
            if (!isValid) {
                // 清空无效的token
                localStorage.removeItem('token');
                currentToken = '';
                //刷新登录按钮
                const btn = document.getElementById('logout');
                btn.innerText = '去登录';
                btn.classList.remove('btn-danger');
            }else{
                loadBottomBar(currentToken, document.querySelector('#bottom-tab-bar'));
                showUserInfo();
                addInputListener();
                addBtnListener();
            }
        });
    </script>
</body>
</html>
