<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超市自助比价</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        img{
            height: 250px;
        }
        header{
            justify-content: flex-start;
        }
        #unit{
            text-decoration: underline 2px;
            text-underline-offset: 5px;
            font-weight: 800; 
            margin-left: 10px; 
            cursor: pointer;
            width: 70px;
            border-radius: 5px;
        }
        #unitList{
            border-radius: 10px;
            transform: translateY(0px);
            
        }
        .form-group{
            display: grid;
            grid-template-columns: 50px 1fr 80px;
            row-gap: 5px;
            column-gap: 0;
            grid-template-areas: "sl si si"
                                 "wl wi wi"
                                 "pl pi ui"
                                 "il ii ii";
            width: 100%;
            margin-bottom: 10px;
        }
        /* 网格区域分配 */
        .sl { grid-area: sl; }
        .si { grid-area: si; }
        .wl { grid-area: wl; }
        .wi { grid-area: wi; }
        .pl { grid-area: pl; }
        .pi { grid-area: pi; }
        .ui {
            grid-area: ui;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            position: relative;
        }
        .il { grid-area: il; }
        .ii { grid-area: ii; }
        .inputarea{
            display: flex; 
            position: relative;        
        }
        .bluelist{
            position: absolute; 
            z-index: 999;
            transform: translateY(60px);
        }
        .hidden{display: none;}
    </style>
</head>
<body>
    <header>
        <div class="priceNav"><i class="fas fa-bars" ></i></div>
        <nav id="bottom-tab-bar" class="bottom-tab-bar conceal hidden"></nav>
    </header>
    <main>
        <div id="message"></div>
        <div class="form-group">
            <label for="marketInput" class="sl">超市：</label>
            <div class="si inputarea">
                <input value="邛崃发到家" type="text" id="marketInput" name="marketInput" placeholder="从下拉列表选择" autocomplete="off">
                <li id="marketList" class="bluelist hidden">
                    <!-- 此处加载超市列表 -->
                </li>

            </div>
            
            <label for="wareInput" class="wl">商品：</label>
            <div class="wi inputarea">
                <input type="text" id="wareInput" name="ware" placeholder="从下拉列表选择" autocomplete="off">
                <li id="wareList" class="bluelist hidden">
                    <!-- 此处加载商品列表 -->
                </li>
            </div>
            <label for="priceInput" class="pl">价格：</label>
            <input type="number" id="priceInput" class="pi" name="price" placeholder="输入价格" autocomplete="off">
            <div class="ui">
                <a id="unit">元/斤 ▼</a>
                <li id="unitList" class="bluelist hidden">
                    <!-- 此处加载单位列表 -->
                </li>
            </div>
            <label for="imgInput" class="il">图片：</label>
            <input type="file" id="imgInput" class="ii" name="image" accept="image/*">
        </div>
        <button type="submit" id="submitBtn" disabled>提交</button>
        <div id="showimg"></div>
    </main>
    
    <script type="module">
        import {fetchWareData, loadBottomBar, unitList} from './js/loadDatas.mjs';
        import {compressImage} from './js/compressimage.mjs';

        const API_URL = window.location.origin + '/api';
        let currentToken = localStorage.getItem('token') || '';
        let userIdTemp = localStorage.getItem('userIdTemp');

        const DOM = {
            message:document.getElementById('message'),
            marketInput:document.getElementById('marketInput'),
            marketList:document.getElementById('marketList'),
            wareInput:document.getElementById('wareInput'),
            wareList:document.getElementById('wareList'),
            priceInput:document.getElementById('priceInput'),
            unit:document.getElementById('unit'),
            unitList:document.getElementById('unitList'),
            imgInput:document.querySelector('#imgInput'),
            submitBtn:document.getElementById('submitBtn'),
            bottomTabBar:document.querySelector('#bottom-tab-bar')
        }
        let theImg;

        if (!userIdTemp) {
            userIdTemp = 'userIdTemp_' + new Date().toLocaleString('zh-CN') + '_' + Math.random().toString(36).slice(2, 9) + '_1';
            localStorage.setItem('userIdTemp', userIdTemp);
        }

        //加载超市和商品列表
        async function loadwares (input, list, data) {
            loadlist(list, data);
            InputFilter(input, list, data);

            //设置监听函数
            showHidelist(input, list, delAlias(data));
            listToInput(list, input);
        };

        //加载候选列表函数
        function loadlist(List, data, delAlias=true){
            List.innerHTML = ''
            if(delAlias){
                for (let i of data){
                    const a = document.createElement('a');
                    a.textContent = i.split('#')[0];
                    List.appendChild(a);
                }
            }else{
                for (let i of data){
                    const a = document.createElement('a');
                    a.textContent = i;
                    List.appendChild(a);
                }
            }
        }

        //监视输入框显示或隐藏列表
        function showHidelist(Input, List, data){
            let closelist;
            Input.addEventListener('focus', ()=>{
                List.classList.remove('hidden');
                closelist = true;
            });
            List.addEventListener('mousedown', ()=>{
                closelist = false;//确保list被点击后才关闭
            });

            Input.addEventListener('blur', ()=>{
                if (closelist){
                    List.classList.add('hidden');
                }else{
                    setTimeout(()=>{
                        List.classList.add('hidden');
                    },100);
                }
                if (!data.includes(Input.value) && Input.value){
                    DOM.message.innerHTML = `（${Input.value}）不在列表内`
                }
            });
        }

        //根据输入筛选下拉列表
        function InputFilter(Input, list, data){
            Input.addEventListener('input', ()=>{
                Input.style.border = '2px solid #e0e6ed';
                const inputValue = Input.value.trim();
                const newdata = [];
                for (let i of data){
                    if (i.includes(inputValue)){
                        newdata.push(i);
                    }
                }
                if (!newdata.length){
                    DOM.message.innerHTML = `（${inputValue}）不在列表中`
                }else{
                    DOM.message.innerHTML=''
                    }
                loadlist(list, newdata, false)
                validateInput();
            });
        }

        //验证输入激活提交按钮
        function validateInput (){
            const wareinputValue = DOM.wareInput.value.trim();
            const marketinputValue = DOM.marketInput.value.trim();
            const ware = JSON.parse(localStorage.getItem('ware')).ware;
            const newware = delAlias(ware);
            const market = JSON.parse(localStorage.getItem('ware')).market;
            const newmarket = delAlias(market);
            
            if (newware.includes(wareinputValue) && newmarket.includes(marketinputValue)){
                DOM.submitBtn.disabled = false
            }else{
                DOM.submitBtn.disabled = true
            }
        }

        // 去除#后面别名的函数
        function delAlias(data) {
            return data.map(item => item.split('#')[0]);
        }

        //监视列表点击赋值给输入框
        function listToInput (List, Input){
            List.addEventListener('click', (e)=>{
                const i = e.target;
                if (i !== List){
                    Input.value = i.innerHTML.split('#')[0];
                    List.classList.add('hidden');
                    
                    Input.style.border = '2px solid #0dff00';
                    DOM.message.innerHTML = '';
                    setTimeout(validateInput, 10)
                }
            })
        }
        
        async function imgSelected(e){
            const img = e.target.files[0];
            if(!img) return;

            // 压缩图片
            const compressedFile = await compressImage(img);
            theImg = compressedFile;
            
            // 显示图片
            const imgUrl = URL.createObjectURL(compressedFile);
            const showimg = document.querySelector('#showimg');
            showimg.innerHTML = `
                <h4>预览：</h4>
                <img src="${imgUrl}">
                <p>文件名：${compressedFile.name}</p>
                <p>文件类型：${compressedFile.type}</p>
                <p>文件大小：${(compressedFile.size / 1024).toFixed(2)} KB</p>
            `;

        }
        
        //上传图片
        function uploadImg(){
            const img = theImg;
            const formData = new FormData();
            formData.append('image', img);
            formData.append('uploader', '前端用户');
            console.log(img);
            return formData;
        }

        //提交价格数据
        async function submitprice() {
            const user = JSON.parse( localStorage.getItem('user')) || '';
            const username = user.username || userIdTemp;
            const marketInput = DOM.marketInput.value.trim();
            const wareInput = DOM.wareInput.value.trim();
            const priceInput = DOM.priceInput.value;
            const unit = DOM.unit.innerHTML.slice(0, -1);
            const Message = DOM.message;

            const formData = new FormData();
            formData.append('image', theImg);
            formData.append('jsonData', JSON.stringify({ userIdTemp, marketInput, wareInput, priceInput, unit }));

            if (!marketInput){
                Message.innerHTML = '请输入超市'
                return
            }
            if (!priceInput){
                Message.innerHTML = '请输入价格'
                return
            }

            console.log(`${username}开始提交${wareInput}:${priceInput}${unit}`)
            Message.innerHTML = `开始提交${wareInput}:${priceInput}${unit}`
            let result;
            try {
                const response = await fetch(`${API_URL}/products/user/submitprice`, {
                    method: 'POST',
                    headers: { 'authorization': currentToken  },
                    body: formData
                });
                result = await response.json();
            } catch (error) {
                Message.innerHTML = '服务器网络错误'
            }

            if (result.success) {
                Message.innerHTML = `${wareInput}:${priceInput}${unit} 提交成功！`
                console.log(result.publicUrl)
            } else {
                Message.innerHTML = result.message;
                if (result.message === '请先登录或注册，试用次数结束') {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    currentToken = '';
                    alert(result.message);
                    window.location.href = '/login';
                }
            }

        }

        //调整单位列表的位置
        function adjustUnitList(list){
            list.style.transform = `translateY(${(DOM.unitList.offsetHeight / -2)+(DOM.unit.offsetHeight / -2) -2}px)`;
        }

        //页面加载完成时启动
        window.addEventListener('DOMContentLoaded', async ()=>{
            //加载导航栏
            const navBtn = document.querySelector('header .priceNav');
            loadBottomBar(currentToken, navBtn, DOM.bottomTabBar);
            //加载商品数据
            const wareData = await fetchWareData();
            localStorage.setItem('ware', JSON.stringify(wareData));
            //监听单位和提交按钮和图片输入框
            DOM.unit.addEventListener('click', async (e)=>{
                const list =  await unitList(e, wareData.unit);
                adjustUnitList(list);
            } );
            DOM.submitBtn.addEventListener('click',submitprice);
            DOM.imgInput.addEventListener('change', (e)=>{imgSelected(e)});

            //加载列表和监听函数
            loadwares(DOM.marketInput, DOM.marketList, wareData.market);
            loadwares(DOM.wareInput, DOM.wareList, wareData.ware);
        })
    </script>
</body>
</html>
