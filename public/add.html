<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超市自助比价</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        
        #unit{
            text-decoration: underline 2px;
            text-underline-offset: 5px;
            font-weight: 800; 
            margin-left: 10px; 
            cursor: pointer;
            width: 70px;
        }
        #unitList{
            border-radius: 10px;
            transform: translateY(0px);
            
        }
        .form-group{
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 5px;
            margin-bottom: 10px;
        }
        .inputarea{
            display: flex;
        }
        .bluelist{
            display: none;
            position: absolute; 
            z-index: 999;
            transform: translateY(60px);
        }        
    </style>
</head>
<body>
    <div id="message"></div>
    <div class="form-group">
        <div class="inputarea">
            <label for="marketInput">超市：</label>
            <div style="display: flex; flex: 1; position: relative;">
                <input value="邛崃发到家" type="text" id="marketInput" name="marketInput" placeholder="从下拉列表选择" autocomplete="off">
                <li id="marketList" class="bluelist">
                    <!-- 此处加载超市列表 -->
                </li>

            </div>
            
        </div>
        <div class="inputarea">
            <label for="wareInput">商品：</label>
            <div style="display: flex; flex: 1; position: relative;">
                <input type="text" id="wareInput" name="ware" placeholder="从下拉列表选择" autocomplete="off">
                <li id="wareList" class="bluelist">
                    <!-- 此处加载商品列表 -->
                </li>
            </div>
        </div>
        <div class="inputarea">
            <label for="priceInput">价格：</label>
            <input type="number" id="priceInput" name="price" placeholder="输入价格" autocomplete="off">
            <div style="display: flex; flex-direction: column; justify-content: center; position: relative;">
                <a id="unit">元/斤 ▼</a>
                <li id="unitList" class="bluelist">
                    <!-- 此处加载单位列表 -->
                </li>
            </div>
        </div>
    </div>
    <button type="submit" id="submitBtn" disabled>提交</button>

    <nav id="bottom-tab-bar" class="bottom-tab-bar"></nav>
    <script type="module">
        import {loadBottomBar} from './js/bottombar.mjs';
        import {unitList} from './js/showunitlist.mjs';
        import {fetchWareData} from './js/getwaredata.mjs';

        const API_URL = window.location.origin + '/api';
        let currentToken = localStorage.getItem('token') || '';
        let userIdTemp = localStorage.getItem('userIdTemp');

        const DOM = {
            message:document.getElementById('message'),
            marketInput:document.getElementById('marketInput'),
            marketList:document.getElementById('marketList'),
            wareInput:document.getElementById('wareInput'),
            wareList:document.getElementById('wareList'),
            priceInput:document.getElementById('priceInput'),
            unit:document.getElementById('unit'),
            bottomTabBar:document.querySelector('#bottom-tab-bar')
        }

        if (!userIdTemp) {
            userIdTemp = 'userIdTemp_' + new Date().toLocaleString('zh-CN') + '_' + Math.random().toString(36).slice(2, 9) + '_1';
            localStorage.setItem('userIdTemp', userIdTemp);
        }

        //异步加载超市和商品列表
        async function loadwares (ware) {
            loadlist(DOM.marketInput, DOM.marketList, ware.market);
            loadlist(DOM.wareInput, DOM.wareList, ware.ware);
            localStorage.setItem('ware', JSON.stringify(ware));
            InputFilter(DOM.marketInput, DOM.marketList, ware.market);
            InputFilter(DOM.wareInput, DOM.wareList, ware.ware);
        };

        //加载候选列表函数
        function loadlist(Input, List, data, delAlias=true){
            List.innerHTML = ''
            if(delAlias){
                for (let i of data){
                    i = i.split('#')[0];
                    List.innerHTML += `<a>${i}</a>`
                }
            }else{
                for (let i of data){
                    List.innerHTML += `<a>${i}</a>`
                }
            }

            //监视列表点击赋值给输入框
            List.addEventListener('click', (e)=>{
                const i = e.target;
                if (i !== List){
                    if(delAlias){
                        Input.value = i.innerHTML;
                    }else{
                        Input.value = i.innerHTML.split('#')[0];
                    }
                    List.style.display = 'none';
                    Input.style.border = '2px solid #0dff00';
                    DOM.message.innerHTML = '';
                    setTimeout(validateInput, 10)
                }
            })
        }

        //监视输入框显示或隐藏列表
        function showHidelist(Input, List, data){
            //去除#后面的别名
            const newdata = [];
            for (let i of data){
                i = i.split('#')[0];
                newdata.push(i);
            }

            let closelist;
            Input.addEventListener('focus', ()=>{
                List.style.display = 'flex';
                closelist = true;
                document.querySelector('#bottom-tab-bar').style.display = 'none';
            });
            List.addEventListener('mousedown', ()=>{
                closelist = false;
            });
            Input.addEventListener('blur', ()=>{
                if (closelist){
                    List.style.display = 'none';
                }
                closelist = true;
                if (!newdata.includes(Input.value) && Input.value){
                    DOM.message.innerHTML = `（${Input.value}）不在列表内`
                }else{
                    if (Input.value){Input.style.border = '2px solid #0dff00';}
                }
                document.querySelector('#bottom-tab-bar').style.display = 'flex';
            });
        }

        //根据输入筛选下拉列表
        function InputFilter(Input, list, data){
            showHidelist(Input, list, data)
            Input.addEventListener('input', ()=>{
                Input.style.border = '2px solid #e0e6ed';
                const inputValue = Input.value.trim();
                const newdata = [];
                for (let i of data){
                    if (i.includes(inputValue)){
                        newdata.push(i);
                    }
                }
                if (!newdata.length){
                    DOM.message.innerHTML = `（${inputValue}）不在列表中`
                }else{
                    DOM.message.innerHTML=''
                    }
                loadlist(Input, list, newdata, false)
                validateInput();
            });
        }

        //验证输入激活提交按钮
        function validateInput (){
            const wareinputValue = DOM.wareInput.value.trim();
            const marketinputValue = DOM.marketInput.value.trim();
            const ware = JSON.parse(localStorage.getItem('ware')).ware;
            let newware = [];
            for (let i of ware){newware.push(i.split('#')[0])};
            const market = JSON.parse(localStorage.getItem('ware')).market;
            let newmarket = [];
            for (let i of market){newmarket.push(i.split('#')[0])};
            
            if (newware.includes(wareinputValue) && newmarket.includes(marketinputValue)){
                document.getElementById('submitBtn').disabled = false
            }else{
                document.getElementById('submitBtn').disabled = true
            }
        }


        //提交价格数据
        async function submitprice() {
            const user = JSON.parse( localStorage.getItem('user')) || '';
            const username = user.username || userIdTemp;
            const marketInput = DOM.marketInput.value.trim();
            const wareInput = DOM.wareInput.value.trim();
            const priceInput = DOM.priceInput.value;
            const unit = DOM.unit.innerHTML.slice(0, -1)
            const Message = DOM.message;

            if (!marketInput){
                Message.innerHTML = '请输入超市'
                return
            }
            if (!priceInput){
                Message.innerHTML = '请输入价格'
                return
            }

            console.log(`${username}开始提交${wareInput}:${priceInput}${unit}`)
            Message.innerHTML = `开始提交${wareInput}:${priceInput}${unit}`

            try {
                const response = await fetch(`${API_URL}/products/user/submitprice`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: currentToken, userIdTemp, marketInput, wareInput, priceInput, unit })
                });

                const result = await response.json();
                
                if (result.success) {
                    Message.innerHTML = `${wareInput}:${priceInput}${unit} 提交成功！`
                } else {
                    Message.innerHTML = result.message;
                    if (result.message === '请先登录或注册，试用次数结束') {
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                        currentToken = '';
                        alert(result.message);
                        window.location.href = '/login';
                    }
                }
            } catch (error) {
                Message.innerHTML = '服务器网络错误'
            }

        }

        function adjustUnitList(){
            console.log('开始调整单位列表位置')
            const unit = document.querySelector('#unit');
            const unitList = document.querySelector('#unitList');
            unitList.style.transform = `translateY(${(unitList.offsetHeight / -2)+(unit.offsetHeight / -2)}px)`;
        }

        //页面加载完成时启动
        window.addEventListener('DOMContentLoaded', async ()=>{
            const wareData = await fetchWareData();
            document.querySelector('#unit').addEventListener('click', async (e)=>{
                await unitList(e, wareData.unit);
                adjustUnitList();
            } );
            document.querySelector('#submitBtn').addEventListener('click',submitprice);
            loadBottomBar(currentToken, document.querySelector('#bottom-tab-bar'));
            loadwares(wareData);
        })
    </script>
</body>
</html>
